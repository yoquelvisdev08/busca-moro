<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Olimpo — portal Orion y Poseidon" />
    <meta name="theme-color" content="#0a0e17" />
    <title>Olimpo</title>
    <link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
    <link href="https://fonts.bunny.net/css?family=geist:400,500,600" rel="stylesheet" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0e17;
        --surface: #121826;
        --border: rgba(148, 163, 184, 0.12);
        --text: #f1f5f9;
        --muted: #94a3b8;
        --dim: #64748b;
        --orion: #818cf8;
        --poseidon: #22d3ee;
      }

      html {
        color-scheme: dark;
      }

      body {
        min-height: 100vh;
        font-family: "Geist", system-ui, sans-serif;
        font-size: 15px;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
      }

      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 3rem 1.5rem 4rem;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 4rem;
      }

      .logo {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--text);
        text-decoration: none;
      }

      .logo img {
        width: 1.35rem;
        height: 1.35rem;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 0.72rem;
        color: var(--muted);
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--dim);
      }

      .dot.ok {
        background: #34d399;
      }

      .dot.err {
        background: #fb7185;
      }

      .intro {
        margin-bottom: 2.5rem;
      }

      .intro h1 {
        font-size: clamp(1.75rem, 5vw, 2.25rem);
        font-weight: 600;
        letter-spacing: -0.03em;
        line-height: 1.15;
        margin-bottom: 0.75rem;
      }

      .intro p {
        color: var(--muted);
        max-width: 32rem;
      }

      .cards {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .card {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1.15rem 1.25rem;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--surface);
        text-decoration: none;
        color: inherit;
        transition: border-color 0.15s ease, background 0.15s ease;
      }

      .card:hover {
        border-color: rgba(148, 163, 184, 0.28);
        background: #151c2c;
      }

      .card-icon {
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 8px;
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }

      .card.orion .card-icon {
        background: rgba(129, 140, 248, 0.12);
        color: var(--orion);
      }

      .card.poseidon .card-icon {
        background: rgba(34, 211, 238, 0.1);
        color: var(--poseidon);
      }

      .card-icon img {
        width: 1.35rem;
        height: 1.35rem;
      }

      .card-icon svg {
        width: 1.15rem;
        height: 1.15rem;
      }

      .card-body {
        flex: 1;
        min-width: 0;
      }

      .card-body h2 {
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin-bottom: 0.15rem;
      }

      .card-body p {
        font-size: 0.82rem;
        color: var(--muted);
        line-height: 1.45;
      }

      .card-arrow {
        color: var(--dim);
        flex-shrink: 0;
        transition: transform 0.15s ease, color 0.15s ease;
      }

      .card:hover .card-arrow {
        color: var(--muted);
        transform: translateX(2px);
      }

      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        justify-content: space-between;
        font-size: 0.72rem;
        color: var(--dim);
      }

      footer a {
        color: var(--muted);
        text-decoration: none;
      }

      footer a:hover {
        color: var(--text);
      }

      .links {
        display: flex;
        gap: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a class="logo" href="/">
          <img src="/assets/logos/olimpo.svg" alt="" width="22" height="22" />
          Olimpo
        </a>
        <div class="status" id="api-status" role="status">
          <span class="dot" id="status-dot"></span>
          <span id="status-label">Comprobando…</span>
        </div>
      </header>

      <section class="intro">
        <h1>Elige un módulo</h1>
        <p>
          Orion para prospección B2B automatizada. Poseidon para leads calientes en español con
          contacto manual.
        </p>
      </section>

      <nav class="cards" aria-label="Módulos">
        <a class="card orion" href="/orion/">
          <div class="card-icon" aria-hidden="true">
            <img src="/assets/logos/orion.svg" alt="" width="22" height="22" />
          </div>
          <div class="card-body">
            <h2>Orion</h2>
            <p>Scout, auditoría, closer y outreach B2B.</p>
          </div>
          <span class="card-arrow" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 6l6 6-6 6" />
            </svg>
          </span>
        </a>

        <a class="card poseidon" href="/poseidon/">
          <div class="card-icon" aria-hidden="true">
            <img src="/assets/logos/poseidon.svg" alt="" width="22" height="22" />
          </div>
          <div class="card-body">
            <h2>Poseidon</h2>
            <p>Radar de intención en Reddit y foros en español.</p>
          </div>
          <span class="card-arrow" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 6l6 6-6 6" />
            </svg>
          </span>
        </a>
      </nav>

      <footer>
        <span>localhost:3000</span>
        <div class="links">
          <a href="/api/health" target="_blank" rel="noopener">API</a>
        </div>
      </footer>
    </div>

    <script>
      (function () {
        var dot = document.getElementById("status-dot");
        var label = document.getElementById("status-label");
        fetch("/api/health", { cache: "no-store" })
          .then(function (res) {
            if (!res.ok) throw new Error("fail");
            return res.json();
          })
          .then(function () {
            dot.className = "dot ok";
            label.textContent = "API ok";
          })
          .catch(function () {
            dot.className = "dot err";
            label.textContent = "API caída";
          });
      })();
    </script>
  </body>
</html>

name: orion

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

networks:
  orion-core:
    driver: bridge
    name: orion-core
  orion-edge:
    driver: bridge
    name: orion-edge

volumes:
  pg_data:
    name: orion-pg-data
  redis_data:
    name: orion-redis-data
  ollama_data:
    name: orion-ollama-data
  npm_data:
    name: orion-npm-data
  npm_letsencrypt:
    name: orion-npm-letsencrypt
  screenshots:
    name: orion-screenshots
  reports:
    name: orion-reports

services:
  postgres:
    image: postgres:16-alpine
    container_name: orion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orion}
      POSTGRES_USER: ${POSTGRES_USER:-orion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_env}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./orion/infra/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - orion-core
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orion} -d ${POSTGRES_DB:-orion}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: orion-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-change_me_in_env}
    volumes:
      - redis_data:/data
    networks:
      - orion-core
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_in_env}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  # Ollama: LLM local opcional. Por defecto el Closer usa un proveedor remoto
  # OpenAI-compatible (DeepSeek). Levanta Ollama solo si quieres self-host:
  #   docker compose --profile llm-local up -d ollama
  ollama:
    image: ollama/ollama:latest
    container_name: orion-ollama
    restart: unless-stopped
    profiles: ["llm-local"]
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - orion-core
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *default-logging

  api:
    build:
      context: .
      dockerfile: orion/api/Dockerfile
    container_name: orion-api
    restart: unless-stopped
    env_file: ./.env
    environment:
      SERVICE_NAME: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - screenshots:/app/storage/screenshots
      - reports:/app/storage/reports
    networks:
      - orion-core
      - orion-edge
    ports:
      - "8000:8000"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *default-logging

  # SearXNG: meta-search engine self-hosted. Agrega 70+ motores (Google, Bing,
  # DuckDuckGo, etc.) sin API key ni límites. El Scout lo usa para discovery.
  searxng:
    image: searxng/searxng:latest
    container_name: orion-searxng
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: "http://localhost:8080/"
      SEARXNG_SECRET: ${SEARXNG_SECRET:-auto_generated}
    volumes:
      - ./orion/infra/searxng/settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - orion-core
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  scout:
    build:
      context: ./orion/discovery
      dockerfile: Dockerfile
    container_name: orion-scout
    restart: unless-stopped
    env_file: ./.env
    environment:
      SERVICE_NAME: scout
      SCOUT_ANALYZE_HTTP_PORT: "8082"
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
      searxng:
        condition: service_healthy
    networks:
      - orion-core
    logging: *default-logging

  auditor:
    build:
      context: ./orion/audit
      dockerfile: Dockerfile
    container_name: orion-auditor
    restart: unless-stopped
    env_file: ./.env
    environment:
      SERVICE_NAME: auditor
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - screenshots:/app/storage/screenshots
    networks:
      - orion-core
    shm_size: "2gb"
    logging: *default-logging

  closer:
    build:
      context: ./orion/intelligence
      dockerfile: Dockerfile
    container_name: orion-closer
    restart: unless-stopped
    env_file: ./.env
    environment:
      SERVICE_NAME: closer
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - orion-core
    logging: *default-logging

  sniper:
    build:
      context: ./orion/monitor
      dockerfile: Dockerfile
    container_name: orion-sniper
    restart: unless-stopped
    env_file: ./.env
    environment:
      SERVICE_NAME: sniper
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - orion-core
    logging: *default-logging

  poseidon:
    build:
      context: ./poseidon
      dockerfile: Dockerfile
    container_name: orion-poseidon
    restart: unless-stopped
    env_file: ./.env
    environment:
      SERVICE_NAME: poseidon
      POSEIDON_LOOP_INTERVAL_MINUTES: ${POSEIDON_LOOP_INTERVAL_MINUTES:-45}
      POSEIDON_USE_LLM: ${POSEIDON_USE_LLM:-true}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
      searxng:
        condition: service_healthy
    networks:
      - orion-core
    logging: *default-logging

  poseidon-frontend:
    build:
      context: ./poseidon/frontend
      dockerfile: Dockerfile
      args:
        VITE_ORION_APP_URL: ${POSEIDON_ORION_APP_URL:-http://localhost:3000}
    container_name: poseidon-frontend
    restart: unless-stopped
    env_file: ./.env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - orion-core
      - orion-edge
    ports:
      - "3001:80"
    expose:
      - "80"
    logging: *default-logging

  frontend:
    build:
      context: ./orion/frontend
      dockerfile: Dockerfile
    container_name: orion-frontend
    restart: unless-stopped
    env_file: ./.env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - orion-core
      - orion-edge
    ports:
      - "3000:80"
    expose:
      - "80"
    logging: *default-logging

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: orion-npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "${NPM_ADMIN_PORT:-81}:81"
    environment:
      DISABLE_IPV6: "true"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - orion-edge
    logging: *default-logging
